product_list:
  output_dir: /mnt/output/
  subscribe_topics:
    - /segment/SAFE/GRD/IW/
  use_extern_calib: false
  fname_pattern: "{start_time:%Y%m%d_%H%M%S}_{platform_name}_{scan_mode:2s}_{productname}_40m.tiff"
  publish_topic: /raster/2A/sar-c
  reader: sar-c_safe
  use_tmp_file: true
  delay_composites: false
  resampler: gradient_search
  overviews_resampling: bilinear

  areas:
    null:
      areaname: satproj
      products:
        sar-ice-log-iw:
          productname: sar-ice-log-v
          resolution: 80
          formats:
            - format: tif
              writer: geotiff
              blockxsize: 512
              blockysize: 512
              tiled: true
              photometric: YCBCR
              compress: JPEG
              overviews: [2, 4, 8, 16, 32, 64, 128, 256]
              driver: COG

        sar-ice-log:
          productname: sar-ice-log-h
          resolution: 80
          formats:
            - format: tif
              writer: geotiff
              blockxsize: 512
              blockysize: 512
              tiled: true
              photometric: YCBCR
              compress: JPEG
              overviews: [2, 4, 8, 16, 32, 64, 128, 256]
              driver: COG

        # vv-fmi-db:
        #   productname: VV
        #   resolution: 80
        #   formats:
        #     - format: tif
        #       writer: geotiff
        #       blockxsize: 512
        #       blockysize: 512
        #       tiled: true
        #       compress: JPEG
        #       overviews: [2, 4, 8, 16, 32, 64, 128, 256]
        #       driver: COG
        #       fill_value: 0
        #
        # hh-fmi-db:
        #   productname: HH
        #   resolution: 80
        #   formats:
        #     - format: tif
        #       writer: geotiff
        #       blockxsize: 512
        #       blockysize: 512
        #       tiled: true
        #       compress: JPEG
        #       overviews: [2, 4, 8, 16, 32, 64, 128, 256]
        #       driver: COG
        #       fill_value: 0

workers:
  - fun: !!python/name:trollflow2.plugins.create_scene
  - fun: !!python/name:trollflow2.plugins.load_composites
  - fun: !!python/name:trollflow2.plugins.resample
  - fun: !!python/name:trollflow2.plugins.save_datasets
  - fun: !!python/name:trollflow2.plugins.add_overviews
  - fun: !!python/object:trollflow2.plugins.FilePublisher {
        port: 10009,
        nameservers: false,
  }
