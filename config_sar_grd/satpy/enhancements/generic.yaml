enhancements:
  default:
    operations:
    - name: stretch
      method: !!python/name:satpy.enhancements.stretch
      kwargs: {stretch: linear}

  iw-co-polarized:
    standard_name: iw-co-polarized
    operations:
    - name: stretch
      method: !!python/name:satpy.enhancements.stretch
      kwargs:
        stretch: crude
        min_stretch: [-50]
        max_stretch: [0]

  sar-ice-log:
    standard_name: sar-ice-log
    operations:
    - name: stretch
      method: !!python/name:satpy.enhancements.stretch
      kwargs:
        stretch: crude
        min_stretch: [-43, -42, -50]
        max_stretch: [-10, 0, 0 ]
    - name: gamma
      method: !!python/name:satpy.enhancements.gamma
      kwargs:
        gamma: [1.2, 0.42, 0.75]